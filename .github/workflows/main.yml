name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          # Install capacitor CLI secara lokal agar bisa dipanggil npx
          npm install @capacitor/cli @capacitor/core @capacitor/android
          npm run build

      - name: Capacitor Sync
        run: |
          # Perintah ini akan membuat folder android jika belum ada
          # atau melakukan sinkronisasi jika sudah ada
          npx cap sync android || (npx cap add android && npx cap sync android)

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses || true

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          # Menambahkan stacktrace agar kita bisa lihat error aslinya jika gagal lagi
          ./gradlew assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: airdroid-clone-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
